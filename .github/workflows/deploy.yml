name: Deploy web to digiringo.com

# Builds the production web bundle in the cloud and ships it to Hostinger over
# SSH. Runs from GitHub's runners (a fresh IP every time) so it NEVER trips the
# host's fail2ban/SSH throttle the way repeated local scp does. One-time setup:
# add a repo secret `HOSTINGER_SSH_KEY` = the full contents of the private deploy
# key (~/.ssh/digiringo_deploy). Then every push to main auto-deploys; you can
# also trigger it manually from the Actions tab ("Run workflow").

on:
  push:
    branches: [ main ]
    paths:
      - "src/**"
      - "server/**"
      - "public/**"
      - "index.html"
      - "package.json"
      - "pnpm-lock.yaml"
      - "vite.config.*"
      - ".env.production"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

# Never let two deploys overlap.
concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build web assets (production / live)
        run: pnpm build

      - name: Set up SSH deploy key
        run: |
          mkdir -p ~/.ssh
          # `tr -d '\r'` repairs a key pasted from a Windows editor (CRLF would
          # otherwise corrupt it and SSH auth fails).
          printf '%s\n' "${{ secrets.HOSTINGER_SSH_KEY }}" | tr -d '\r' > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      - name: Install lftp
        run: sudo apt-get update -qq && sudo apt-get install -y -qq lftp

      - name: Deploy via SFTP (no remote shell — Hostinger kills shell sessions
              from datacenter IPs, but the SFTP subsystem is allowed)
        env:
          SSH_HOST: 153.92.10.88
          SSH_USER: u545142772
          SSH_PORT: "65002"
          BASE: domains/digiringo.com/public_html
        run: |
          if ! ssh-keygen -y -f ~/.ssh/deploy_key >/dev/null 2>&1; then
            echo "::error::HOSTINGER_SSH_KEY is not a valid private key — re-copy the ENTIRE key incl. BEGIN/END lines."
            exit 1
          fi
          date > restart.txt
          CP="ssh -a -x -i $HOME/.ssh/deploy_key -p $SSH_PORT -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ConnectTimeout=25"
          lftp -c "
            set sftp:connect-program \"$CP\";
            set sftp:auto-confirm yes;
            set net:max-retries 4; set net:timeout 25; set net:reconnect-interval-base 6;
            set mirror:parallel-transfer-count 1;
            open -u \"$SSH_USER,\" sftp://$SSH_HOST;
            mirror -R --delete --verbose dist/ \"$BASE/dist/\";
            mirror -R --verbose --include-glob=*.mjs server/ \"$BASE/server/\";
            mirror -R --verbose --include-glob=*.sql server/migrations/ \"$BASE/server/migrations/\";
            put -O \"$BASE/tmp/\" restart.txt;
            bye
          "
          echo '✓ deployed via SFTP + restart triggered'

      - name: Verify
        run: |
          sleep 5
          code=$(curl -s -o /dev/null -w '%{http_code}' https://digiringo.com/app || echo "000")
          echo "digiringo.com/app → $code"
          bundle=$(curl -s "https://digiringo.com/app?cb=$(date +%s)" | grep -oE 'main-[A-Za-z0-9_-]+\.js' | head -1)
          echo "live bundle: $bundle"
